---
layout: default
title: Início
---
<section class="hero">
    <p class="hero-kicker">Diário de construção textual - <span class="hero-domain">llagerlof.github.io</span></p>
</section>

<ul class="post-list">
    {% for post in site.posts %}
        <li>
            <h2 class="post-title"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
            <p class="post-meta">{{ post.date | date: "%d/%m/%Y" }}</p>
            <p class="post-summary">{{ post.excerpt | strip_html | truncate: 170 }}</p>
        </li>
    {% endfor %}
</ul>
