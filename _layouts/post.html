---
layout: default
---
<article class="post">
    <header class="post-header">
        <p class="post-meta">
            <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d/%m/%Y" }}</time>
            {% if page.tags and page.tags.size > 0 %}
                • {{ page.tags | join: ", " }}
            {% endif %}
        </p>
        <h1>{{ page.title }}</h1>
    </header>

    <section class="post-content prose">
        {{ content }}
    </section>
</article>
